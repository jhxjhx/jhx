<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>每日推荐 - 蒋昊熹</title>
<style>
:root {
  --bg: #121214;
  --bg-card: #1c1c1e;
  --bg-elevated: #242426;
  --text: #f5f5f7;
  --text-secondary: #98989d;
  --accent: #fc3c44;
  --accent-glow: rgba(252,60,68,0.25);
  --radius: 14px;
  --radius-sm: 10px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  padding-bottom: 32px;
  overflow-x: hidden;
}

::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.12); border-radius:3px; }

/* Back Button */
.back-bar {
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  background: rgba(18,18,20,0.88);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 100;
}
.back-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--bg-elevated);
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text);
  transition: background 0.2s;
}
.back-btn:hover { background: rgba(255,255,255,0.15); }
.back-btn svg { width: 20px; height: 20px; }
.back-title {
  font-size: 20px; font-weight: 700;
  letter-spacing: 0.5px;
}

/* Daily Hero */
.daily-hero {
  padding: 24px 24px 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}
.daily-cover {
  width: 240px; height: 240px;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 12px 48px rgba(0,0,0,0.5);
  margin-bottom: 24px;
}
.daily-cover span {
  font-size: 60px;
  font-weight: 800;
  opacity: 0.4;
  color: #fff;
}
.daily-cover.g1 { background: linear-gradient(135deg, #e74c3c, #c0392b); }
.daily-cover.g2 { background: linear-gradient(135deg, #8e44ad, #6c3483); }
.daily-cover.g3 { background: linear-gradient(135deg, #2980b9, #1a5276); }
.daily-cover.g4 { background: linear-gradient(135deg, #27ae60, #1e8449); }
.daily-cover.g5 { background: linear-gradient(135deg, #f39c12, #d35400); }
.daily-cover.g6 { background: linear-gradient(135deg, #1abc9c, #16a085); }
.daily-cover.g7 { background: linear-gradient(135deg, #e91e63, #ad1457); }
.daily-cover.g8 { background: linear-gradient(135deg, #3f51b5, #283593); }

.daily-info h2 {
  font-size: 26px; font-weight: 800;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.daily-info .daily-artist {
  font-size: 16px; color: var(--text-secondary);
  margin-bottom: 4px;
}
.daily-info .daily-album {
  font-size: 14px; color: var(--text-secondary);
  opacity: 0.7;
}

/* PLACEHOLDER: 日期标签，替换 REPLACE_DAILY_DATE */
.daily-date {
  margin-top: 20px;
  padding: 6px 16px;
  background: var(--bg-card);
  border-radius: 20px;
  font-size: 12px;
  color: var(--text-secondary);
  display: inline-block;
}

/* Action Buttons */
.daily-actions {
  padding: 24px 24px;
  display: flex;
  gap: 12px;
  justify-content: center;
}
.daily-btn {
  padding: 12px 28px;
  border-radius: 24px;
  font-size: 15px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  font-family: inherit;
  transition: transform 0.15s, opacity 0.15s;
}
.daily-btn:active { transform: scale(0.96); }
.daily-btn.primary {
  background: var(--accent);
  color: #fff;
}
.daily-btn.secondary {
  background: var(--bg-card);
  color: var(--text);
}
.daily-btn:hover { opacity: 0.85; }

/* Responsive */
@media (min-width: 600px) {
  .daily-cover { width: 300px; height: 300px; }
  .daily-cover span { font-size: 80px; }
  .daily-hero { padding: 32px 40px 8px; }
  .back-bar { padding: 16px 32px; }
}
</style>
</head>
<body>

<!-- Back Bar -->
<div class="back-bar">
  <button class="back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="back-title">每日推荐</span>
</div>

<!-- Daily Song Hero -->
<div class="daily-hero">
  <!-- PLACEHOLDER: 替换 REPLACE_DAILY_ 为你的实际内容 -->
  <div class="daily-cover g1">
    <span>&#9835;</span>
  </div>
  <div class="daily-info">
    <h2>REPLACE_DAILY_SONG_NAME</h2>
    <div class="daily-artist">REPLACE_DAILY_ARTIST</div>
    <div class="daily-album">专辑：REPLACE_DAILY_ALBUM</div>
  </div>
  <div class="daily-date">REPLACE_DAILY_DATE</div>
</div>

<!-- Action Buttons -->
<div class="daily-actions">
  <button class="daily-btn primary">&#9654; 播放</button>
  <button class="daily-btn secondary">&#9825; 收藏</button>
</div>

</body>
</html>
