<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>每日推荐 - 蒋昊熹</title>
<style>
:root {
  --text: #fff;
  --text-secondary: rgba(255,255,255,0.7);
  --accent: #fc3c44;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #000;
  color: var(--text);
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  -webkit-font-smoothing: antialiased;
  height: 100vh;
  overflow: hidden;
}

/* Full screen video background */
.bg-video {
  position: fixed;
  inset: 0;
  z-index: 0;
  object-fit: cover;
  width: 100%;
  height: 100%;
}

.bg-overlay {
  position: fixed;
  inset: 0;
  z-index: 1;
  background: rgba(0,0,0,0.45);
}

/* Back button */
.back-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 10;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.back-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text);
}

.back-btn svg { width: 20px; height: 20px; }

.back-title {
  font-size: 17px;
  font-weight: 600;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
}

/* Main content - centered */
.main-content {
  position: fixed;
  inset: 0;
  z-index: 5;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 60px 24px;
}

.song-name {
  font-size: 38px;
  font-weight: 800;
  letter-spacing: 1px;
  line-height: 1.2;
  text-shadow: 0 2px 12px rgba(0,0,0,0.6);
  margin-bottom: 12px;
}

.artist {
  font-size: 16px;
  color: var(--text-secondary);
  font-weight: 500;
  text-shadow: 0 1px 6px rgba(0,0,0,0.5);
  margin-bottom: 4px;
}

.album {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
}

/* Play button */
.play-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 40px;
  padding: 14px 40px;
  border-radius: 28px;
  background: var(--accent);
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  text-decoration: none;
  box-shadow: 0 4px 24px rgba(252,60,68,0.4);
  transition: transform 0.15s, box-shadow 0.15s;
  letter-spacing: 0.5px;
}

.play-btn:hover { transform: scale(1.05); box-shadow: 0 6px 32px rgba(252,60,68,0.5); }
.play-btn:active { transform: scale(0.97); }

/* Date badge */
.date-badge {
  margin-top: 24px;
  padding: 5px 14px;
  border-radius: 16px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  font-size: 12px;
  color: rgba(255,255,255,0.5);
}

@media (min-width: 600px) {
  .song-name { font-size: 48px; }
  .artist { font-size: 18px; }
  .album { font-size: 14px; }
}
</style>
</head>
<body>

<!-- Full screen background video -->
<video class="bg-video" autoplay muted loop playsinline>
  <source src="daily-bg.mp4" type="video/mp4">
</video>
<div class="bg-overlay"></div>

<!-- Back button -->
<div class="back-bar">
  <button class="back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="back-title">每日推荐</span>
</div>

<!-- Centered content -->
<div class="main-content">
  <div class="song-name">Disillusioned</div>
  <div class="artist">Daniel Caesar</div>
  <div class="album">NEVER ENOUGH (Bonus Version)</div>
  <a class="play-btn" href="https://music.163.com/#/song?id=2037842125" target="_blank">
    播放
  </a>
  <div class="date-badge">2026年7月6日 · 今日推荐</div>
</div>

</body>
</html>
