<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#121214">
<link rel="manifest" href="manifest.json">
<title>登录</title>
<style>
:root { --bg: #121214; --bg-card: #1c1c1e; --text: #f5f5f7; --text-secondary: #98989d; --accent: #fc3c44; --radius: 14px; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: var(--text); font-family: -apple-system,"PingFang SC","Microsoft YaHei",sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }
.back-bar { padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
.back-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--bg-card); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text); }
.back-btn svg { width: 20px; height: 20px; }
.container { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 24px; }
.avatar { width: 80px; height: 80px; border-radius: 50%; background: url(avatar.jpg) center/cover; box-shadow: 0 4px 20px rgba(252,60,68,0.3); margin-bottom: 24px; }
.title { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 32px; }
.form { width: 100%; max-width: 320px; }
.input-group { margin-bottom: 16px; }
.input-group input { width: 100%; padding: 14px 16px; background: var(--bg-card); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius); color: var(--text); font-size: 15px; font-family: inherit; outline: none; }
.input-group input:focus { border-color: var(--accent); }
.input-group label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; margin-left: 4px; }
.btn { width: 100%; padding: 14px; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 600; font-family: inherit; cursor: pointer; }
.btn-primary { background: var(--accent); color: #fff; margin-top: 8px; }
.btn-outline { background: transparent; color: var(--text-secondary); border: 1px solid rgba(255,255,255,0.15); margin-top: 12px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.msg { margin-top: 12px; font-size: 13px; text-align: center; min-height: 20px; }
.msg.error { color: #ff4d4f; } .msg.success { color: #52c41a; }
.user-card { margin-top: 24px; text-align: center; display: none; }
</style>
</head>
<body>
<div class="back-bar">
  <button class="back-btn" onclick="location.href='index.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
</div>
<div class="container">
  <div class="avatar"></div>
  <div class="title" id="pageTitle">登录</div>
  <div class="subtitle">云端同步，跨设备使用</div>
  <div class="form" id="loginForm">
    <div class="input-group"><label>6位数字ID</label><input type="text" id="uid" placeholder="请输入6位数字ID" maxlength="6" inputmode="numeric"></div>
    <div class="input-group"><label>密码</label><input type="password" id="password" placeholder="请输入密码(至少6位)"></div>
    <div class="input-group" id="extraGroup" style="display:none"><label>确认密码</label><input type="password" id="password2" placeholder="再次输入密码"></div>
    <button class="btn btn-primary" id="submitBtn" onclick="doAuth()">登录</button>
    <button class="btn btn-outline" id="switchBtn" onclick="toggleMode()">没有账号？去注册</button>
    <div class="msg" id="msg"></div>
  </div>
  <div class="user-card" id="userCard">
    <div style="font-size:16px;font-weight:600;" id="userInfo"></div>
    <button class="btn btn-outline" style="margin-top:16px;width:auto;padding:10px 24px;" onclick="logout()">退出登录</button>
  </div>
</div>

<script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
<script>
var app, auth, db;
var isReg = false;

(function() {
  var id = localStorage.getItem('jhx_id');
  if (id) showLoggedIn(id);
})();

function waitSDK(cb) {
  if (typeof cloudbase !== 'undefined') { cb(); return; }
  var t = setInterval(function() {
    if (typeof cloudbase !== 'undefined') { clearInterval(t); cb(); }
  }, 100);
}

waitSDK(function() {
  app = cloudbase.init({ env: 'music75444-d5gorwjxw305fd5a6' });
  auth = app.auth();
  db = app.database();
});

function h(p) { var x = 0; for (var i = 0; i < p.length; i++) { x = ((x << 5) - x) + p.charCodeAt(i); x |= 0; } return Math.abs(x).toString(16); }

function toggleMode() {
  isReg = !isReg;
  document.getElementById('pageTitle').textContent = isReg ? '注册' : '登录';
  document.getElementById('submitBtn').textContent = isReg ? '注册' : '登录';
  document.getElementById('switchBtn').textContent = isReg ? '已有账号？去登录' : '没有账号？去注册';
  document.getElementById('extraGroup').style.display = isReg ? '' : 'none';
  showMsg('');
}

function showMsg(t, type) {
  var m = document.getElementById('msg');
  m.textContent = t; m.className = 'msg ' + (type || '');
}

async function doAuth() {
  if (!auth || !db) { showMsg('服务加载中，请稍后再试', 'error'); return; }
  var uid = document.getElementById('uid').value.trim();
  var pass = document.getElementById('password').value;
  var btn = document.getElementById('submitBtn');
  if (!/^\d{6}$/.test(uid)) { showMsg('ID必须是6位数字', 'error'); return; }
  if (!pass || pass.length < 6) { showMsg('密码至少6位', 'error'); return; }
  if (isReg && pass !== document.getElementById('password2').value) { showMsg('两次密码不一致', 'error'); return; }

  btn.disabled = true; showMsg('连接云端...', '');

  try {
    // Anonymous login to get access
    await auth.signInAnonymously();
    
    var hp = h(pass + uid);
    var coll = db.collection('jhx_users');

    if (isReg) {
      // Check if ID already exists
      var check = await coll.where({ customId: uid }).get();
      if (check.data && check.data.length > 0) { showMsg('该ID已注册', 'error'); btn.disabled = false; return; }
      // Create user record
      await coll.add({ customId: uid, passHash: hp, name: '用户' + uid, createdAt: Date.now() });
    } else {
      // Verify credentials
      var res = await coll.where({ customId: uid }).get();
      if (!res.data || res.data.length === 0) { showMsg('ID不存在，请先注册', 'error'); btn.disabled = false; return; }
      if (res.data[0].passHash !== hp) { showMsg('密码错误', 'error'); btn.disabled = false; return; }
    }

    localStorage.setItem('jhx_id', uid);
    localStorage.setItem('jhx_name', (isReg ? '用户' + uid : (res.data[0].name || '用户' + uid)));
    showMsg(isReg ? '注册成功！数据已上云' : '登录成功！', 'success');
    showLoggedIn(uid);
  } catch(e) {
    showMsg('错误: ' + (e.message || e.code || '未知'), 'error');
    btn.disabled = false;
  }
}

function showLoggedIn(uid) {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('userCard').style.display = 'block';
  document.getElementById('userInfo').textContent = 'ID: ' + uid;
}

function logout() {
  localStorage.removeItem('jhx_id');
  localStorage.removeItem('jhx_name');
  document.getElementById('loginForm').style.display = '';
  document.getElementById('userCard').style.display = 'none';
  showMsg('已退出', 'success');
}
</script>
</body>
</html>
