<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#121214">
<link rel="manifest" href="manifest.json">
<title>登录 - 我</title>
<style>
:root {
  --bg: #121214; --bg-card: #1c1c1e; --text: #f5f5f7;
  --text-secondary: #98989d; --accent: #fc3c44;
  --radius: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh; display: flex; flex-direction: column;
}
.back-bar {
  padding: 16px 20px; display: flex; align-items: center; gap: 12px;
}
.back-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--bg-card); border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text);
}
.back-btn svg { width: 20px; height: 20px; }

.container {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; padding: 40px 24px;
}
.avatar {
  width: 80px; height: 80px; border-radius: 50%;
  background: url(avatar.jpg) center/cover;
  box-shadow: 0 4px 20px rgba(252,60,68,0.3);
  margin-bottom: 24px;
}
.title { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 32px; }

.form { width: 100%; max-width: 320px; }
.input-group {
  margin-bottom: 16px;
}
.input-group input {
  width: 100%; padding: 14px 16px;
  background: var(--bg-card); border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius); color: var(--text);
  font-size: 15px; font-family: inherit;
  outline: none; transition: border-color 0.2s;
}
.input-group input:focus { border-color: var(--accent); }
.input-group label {
  display: block; font-size: 12px; color: var(--text-secondary);
  margin-bottom: 6px; margin-left: 4px;
}

.btn {
  width: 100%; padding: 14px; border: none;
  border-radius: var(--radius); font-size: 16px;
  font-weight: 600; font-family: inherit; cursor: pointer;
  transition: opacity 0.2s;
}
.btn-primary { background: var(--accent); color: #fff; margin-top: 8px; }
.btn-outline {
  background: transparent; color: var(--text-secondary);
  border: 1px solid rgba(255,255,255,0.15); margin-top: 12px;
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.switch-text {
  margin-top: 20px; font-size: 13px; color: var(--text-secondary);
  text-align: center;
}
.switch-text a { color: var(--accent); cursor: pointer; text-decoration: none; }

.msg {
  margin-top: 12px; font-size: 13px; text-align: center;
  min-height: 20px;
}
.msg.error { color: #ff4d4f; }
.msg.success { color: #52c41a; }

.user-card {
  margin-top: 24px; text-align: center; display: none;
}

@media (min-width: 600px) {
  .container { padding: 60px 40px; }
  .form { max-width: 360px; }
}
</style>
</head>
<body>

<div class="back-bar">
  <button class="back-btn" onclick="location.href='index.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
</div>

<div class="container">
  <div class="avatar"></div>
  <div class="title" id="pageTitle">登录</div>
  <div class="subtitle">登录后参与社区互动</div>

  <div class="form" id="loginForm">
    <div class="input-group">
      <label>邮箱</label>
      <input type="email" id="email" placeholder="请输入邮箱" autocomplete="email">
    </div>
    <div class="input-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
    </div>
    <div class="input-group" id="extraGroup" style="display:none">
      <label>确认密码</label>
      <input type="password" id="password2" placeholder="再次输入密码">
    </div>
    <button class="btn btn-primary" id="submitBtn" onclick="handleSubmit()">登录</button>
    <button class="btn btn-outline" id="switchBtn" onclick="toggleMode()">没有账号？去注册</button>
    <div class="msg" id="msg"></div>
  </div>

  <div class="user-card" id="userCard">
    <div style="font-size:16px;font-weight:600;" id="userEmail"></div>
    <div style="font-size:13px;color:var(--text-secondary);margin-top:4px;">已登录</div>
    <button class="btn btn-outline" style="margin-top:16px;width:auto;padding:10px 24px;" onclick="logout()">退出登录</button>
  </div>
</div>

<script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
<script>
var app, auth, authReady = false;

try {
  app = cloudbase.init({
    env: 'music75444-d5gorwjxw305fd5a6'
  });
  auth = app.auth();
  authReady = true;
} catch(e) {
  console.error('CloudBase init failed:', e);
}

var isRegister = false;

function toggleMode() {
  isRegister = !isRegister;
  document.getElementById('pageTitle').textContent = isRegister ? '注册' : '登录';
  document.getElementById('submitBtn').textContent = isRegister ? '注册' : '登录';
  document.getElementById('switchBtn').textContent = isRegister ? '已有账号？去登录' : '没有账号？去注册';
  document.getElementById('extraGroup').style.display = isRegister ? '' : 'none';
  document.getElementById('msg').textContent = '';
  document.getElementById('msg').className = 'msg';
}

function showMsg(text, type) {
  var m = document.getElementById('msg');
  m.textContent = text;
  m.className = 'msg ' + type;
}

async function handleSubmit() {
  if (!authReady) { showMsg('服务未就绪，请刷新页面重试', 'error'); return; }

  var email = document.getElementById('email').value.trim();
  var pass = document.getElementById('password').value;
  var btn = document.getElementById('submitBtn');

  if (!email || !pass) { showMsg('请填写邮箱和密码', 'error'); return; }
  if (isRegister && pass !== document.getElementById('password2').value) {
    showMsg('两次密码不一致', 'error'); return;
  }
  if (pass.length < 6) { showMsg('密码至少6位', 'error'); return; }

  btn.disabled = true;
  showMsg('请稍候...', '');

  try {
    if (isRegister) {
      await auth.signUpWithEmailAndPassword(email, pass);
      showMsg('注册成功，已自动登录', 'success');
    } else {
      await auth.signInWithEmailAndPassword(email, pass);
      showMsg('登录成功', 'success');
    }
    localStorage.setItem('jhx_login', email);
    onLogin(email);
  } catch (e) {
    var err = (e && e.message) || '操作失败，请重试';
    if (err.indexOf('already exists') >= 0) err = '该邮箱已注册';
    if (err.indexOf('invalid') >= 0 || err.indexOf('password') >= 0) err = '邮箱或密码错误';
    if (err.indexOf('not found') >= 0) err = '账号不存在，请先注册';
    showMsg(err, 'error');
    btn.disabled = false;
  }
}

function onLogin(email) {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('userCard').style.display = 'block';
  document.getElementById('userEmail').textContent = email;
  localStorage.setItem('jhx_login', email);
}

async function checkLogin() {
  try {
    var state = await auth.getLoginState();
    if (state) {
      var email = state.user.email || state.user.username || '已登录';
      onLogin(email);
    }
  } catch(e) {}
}

async function logout() {
  await auth.signOut();
  localStorage.removeItem('jhx_login');
  document.getElementById('loginForm').style.display = '';
  document.getElementById('userCard').style.display = 'none';
  document.getElementById('email').value = '';
  document.getElementById('password').value = '';
  document.getElementById('msg').textContent = '';
  showMsg('已退出登录', 'success');
}

checkLogin();
</script>
</body>
</html>
