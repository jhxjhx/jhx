<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#121214">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的主页</title>
<style>
:root {
  --bg: #121214;
  --bg-card: #1c1c1e;
  --bg-elevated: #242426;
  --text: #f5f5f7;
  --text-secondary: #98989d;
  --accent: #fc3c44;
  --accent-glow: rgba(252,60,68,0.25);
  --nav-height: 72px;
  --radius: 14px;
  --radius-sm: 10px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  padding-bottom: calc(var(--nav-height) + 24px);
  overflow-x: hidden;
}

/* Scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.12); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:rgba(255,255,255,0.2); }

/* Animations */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(24px); }
  to   { opacity:1; transform:translateY(0); }
}

.anim-in {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.6s ease-out, transform 0.6s ease-out;
}
.anim-in.visible {
  opacity: 1;
  transform: translateY(0);
}

/* Hero / Profile */
.hero {
  padding: 48px 24px 20px;
  display: flex;
  align-items: center;
  gap: 20px;
  animation: fadeUp 0.7s ease-out;
}
.avatar {
  width: 80px; height: 80px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  box-shadow: 0 4px 24px var(--accent-glow);
}
.hero-text h1 {
  font-size: 28px; font-weight: 700;
  letter-spacing: 1px;
}
.hero-text p {
  font-size: 14px; color: var(--text-secondary);
  margin-top: 4px;
}

/* Section */
.section {
  padding: 8px 24px 28px;
}
.section-header {
  display: flex; align-items:baseline; justify-content:space-between;
  margin-bottom: 16px;
}
.section-header h2 {
  font-size: 22px; font-weight: 700;
  letter-spacing: 0.5px;
}
.section-header span {
  font-size: 13px; color: var(--accent);
  cursor: pointer;
  transition: opacity 0.2s;
}
.section-header span:hover { opacity:0.7; }

/* Music Grid */
.music-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
.music-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  animation: fadeUp 0.5s ease-out both;
  text-decoration: none;
  color: inherit;
  display: block;
}
.music-card:hover {
  transform: scale(1.03);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.music-card:nth-child(1) { animation-delay:0s; }
.music-card:nth-child(2) { animation-delay:0.08s; }
.music-card:nth-child(3) { animation-delay:0.16s; }
.music-card:nth-child(4) { animation-delay:0.24s; }

.music-cover {
  width: 100%;
  aspect-ratio: 1;
  display: flex;
  align-items: flex-end;
  padding: 14px;
  position: relative;
  overflow: hidden;
}
.music-cover::after {
  content: '';
  position: absolute; inset:0;
  background: linear-gradient(transparent 55%, rgba(0,0,0,0.7));
}
.music-cover span {
  position: relative; z-index:1;
  font-size: 14px; font-weight: 600;
  letter-spacing: 0.5px;
}
.music-info {
  padding: 12px 14px 14px;
}
.music-info .title {
  font-size: 14px; font-weight: 600;
  white-space: nowrap; overflow:hidden; text-overflow:ellipsis;
}
.music-info .sub {
  font-size: 12px; color: var(--text-secondary);
  margin-top: 2px;
}

.g1 { background: linear-gradient(135deg, #e74c3c, #c0392b); }
.g2 { background: linear-gradient(135deg, #8e44ad, #6c3483); }
.g3 { background: linear-gradient(135deg, #2980b9, #1a5276); }
.g4 { background: linear-gradient(135deg, #27ae60, #1e8449); }
.g5 { background: linear-gradient(135deg, #f39c12, #d35400); }
.g6 { background: linear-gradient(135deg, #1abc9c, #16a085); }
.g7 { background: linear-gradient(135deg, #e91e63, #ad1457); }
.g8 { background: linear-gradient(135deg, #3f51b5, #283593); }

/* Task Cards */
.task-list {
  display: flex; flex-direction: column; gap: 10px;
}
.task-card {
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  padding: 16px;
  display: flex; align-items:center; gap: 14px;
  transition: transform 0.2s, background 0.2s;
  cursor: pointer;
}
.task-card:hover {
  background: var(--bg-elevated);
  transform: translateX(4px);
}
.task-card:nth-child(1) { animation: fadeUp 0.5s ease-out 0s both; }
.task-card:nth-child(2) { animation: fadeUp 0.5s ease-out 0.1s both; }
.task-card:nth-child(3) { animation: fadeUp 0.5s ease-out 0.2s both; }

.task-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: flex; align-items:center; justify-content:center;
  font-size: 20px;
  flex-shrink: 0;
}
.task-icon.done { background: rgba(39,174,96,0.2); color:#2ecc71; }
.task-icon.soon { background: rgba(243,156,18,0.2); color:#f39c12; }
.task-icon.active { background: var(--accent-glow); color:var(--accent); }

.task-body { flex:1; min-width:0; }
.task-body .task-title { font-size:15px; font-weight:600; }
.task-body .task-desc { font-size:12px; color:var(--text-secondary); margin-top:2px; }
.task-meta { font-size:11px; color:var(--text-secondary); white-space:nowrap; }

/* Plan Cards */
.plan-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
.plan-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 18px 16px;
  transition: transform 0.2s, box-shadow 0.2s;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.plan-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 28px rgba(0,0,0,0.4);
}
.plan-card:nth-child(1) { animation: fadeUp 0.5s ease-out 0s both; }
.plan-card:nth-child(2) { animation: fadeUp 0.5s ease-out 0.1s both; }
.plan-card:nth-child(3) { animation: fadeUp 0.5s ease-out 0.2s both; }
.plan-card:nth-child(4) { animation: fadeUp 0.5s ease-out 0.3s both; }

.plan-card .plan-date {
  font-size: 11px; color: var(--accent); font-weight:600;
  text-transform: uppercase; letter-spacing:1px;
}
.plan-card .plan-title {
  font-size: 16px; font-weight: 700; margin-top:6px;
}
.plan-card .plan-desc {
  font-size: 12px; color: var(--text-secondary); margin-top:4px;
  display: -webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  overflow: hidden;
}
.plan-card .plan-bar {
  position: absolute; bottom:0; left:0; height:3px;
  border-radius: 0 3px 0 0;
}
.plan-bar.p30 { width:30%; background:var(--accent); }
.plan-bar.p60 { width:60%; background:#f39c12; }
.plan-bar.p80 { width:80%; background:#2ecc71; }
.plan-bar.p10 { width:10%; background:var(--accent); }

/* Bottom Nav */
.bottom-nav {
  position: fixed; bottom:0; left:0; right:0;
  height: var(--nav-height);
  background: rgba(24,24,26,0.88);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border-top: 0.5px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 0 8px;
  z-index: 100;
}
.nav-item {
  display: flex; flex-direction:column; align-items:center; gap:4px;
  padding: 6px 14px;
  cursor: pointer;
  transition: color 0.2s;
  color: var(--text-secondary);
  font-size: 10px;
  letter-spacing: 0.3px;
  background: none; border: none;
  font-family: inherit;
}
.nav-item svg {
  width: 22px; height: 22px;
  transition: transform 0.2s;
}
.nav-item.active { color: var(--text); }
.nav-item.active svg { transform: scale(1.08); }
.nav-item:active svg { transform: scale(0.92); }

/* Responsive */
@media (min-width: 600px) {
  .hero { padding:56px 40px 24px; }
  .section { padding:8px 40px 32px; }
  .music-grid { grid-template-columns: repeat(4,1fr); }
  .plan-grid { grid-template-columns: repeat(4,1fr); }
  .avatar { width:100px; height:100px; }
  .hero-text h1 { font-size:34px; }
}

.install-btn {
  position: fixed; bottom: 90px; right: 20px; z-index: 999;
  padding: 12px 20px; border-radius: 24px;
  background: var(--accent); color: #fff;
  font-size: 14px; font-weight: 600; font-family: inherit;
  border: none; cursor: pointer;
  box-shadow: 0 4px 16px rgba(252,60,68,0.4);
  display: none; align-items: center; gap: 6px;
  animation: fadeUp 0.4s ease;
}
.install-btn.show { display: flex; }


.avatar { cursor: pointer; }
.hero-text h1 { cursor: pointer; }
.hero-text h1:hover { opacity: 0.7; }

</style>
</head>

<script>
// Scroll animations
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.15 });
document.querySelectorAll('.anim-in').forEach(el => observer.observe(el));

// Smooth scroll
function scrollToSection(id) {
  document.getElementById(id).scrollIntoView({ behavior:'smooth' });
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  if (event && event.target) {
    var btn = event.target.closest('.nav-item');
    if (btn) btn.classList.add('active');
  }
}

// Nav highlight on scroll
var sections = ['me','music','tasks','plans'];
var navItems = document.querySelectorAll('.nav-item');
var navMap = { me:0, music:1, tasks:2, plans:3 };

window.addEventListener('scroll', function() {
  var current = 'me';
  sections.forEach(function(id) {
    var el = document.getElementById(id);
    if (el && el.getBoundingClientRect().top < window.innerHeight/2) current = id;
  });
  navItems.forEach(function(item, i) {
    if (i === navMap[current]) item.classList.add('active');
    else item.classList.remove('active');
  });
});
// 网易云音乐外链跳转：手机端尝试启动APP，失败则用网页版
function openMusic(el) {
  var ua = navigator.userAgent.toLowerCase();
  var isMobile = /android|iphone|ipad|ipod/.test(ua);
  if (isMobile) {
    var songId = el.getAttribute('data-song-id');
    // 尝试用 orpheus:// 协议打开网易云APP
    var iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.src = 'orpheus://song/' + songId;
    document.body.appendChild(iframe);
    // 800ms后如果APP未打开，跳转网页版
    setTimeout(function() {
      document.body.removeChild(iframe);
      window.location.href = el.href;
    }, 800);
    return false;
  }
  // 桌面端直接打开网页版
  window.open(el.href, '_blank');
  return false;
}
</script>

</script>

<button class="install-btn" id="installBtn" onclick="installApp()">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 3v12m0 0l-4-4m4 4l4-4"/><path d="M5 17v3h14v-3"/></svg>
  安装App
</button>


<script>
var deferredPrompt;
var installBtn = document.getElementById('installBtn');

// Always show button after 2 seconds
setTimeout(function() { installBtn.classList.add('show'); }, 2000);

window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.classList.add('show');
});

window.addEventListener('appinstalled', function() {
  installBtn.classList.remove('show');
  deferredPrompt = null;
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(r) {
      if (r.outcome === 'accepted') installBtn.classList.remove('show');
      deferredPrompt = null;
    });
  } else {
    alert('请用Chrome或Edge浏览器打开，然后：\n\n安卓：点浏览器菜单 → 安装应用\niPhone：点分享 → 添加到主屏幕\n电脑：地址栏右侧点安装图标');
  }
}
</script>
