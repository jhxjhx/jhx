<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>收藏专辑 - 蒋昊熹</title>
<style>
:root {
  --bg: #121214; --text: #f5f5f7; --text-secondary: #98989d;
  --accent: #fc3c44; --radius: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #000; color: var(--text);
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  -webkit-font-smoothing: antialiased;
  height: 100vh; overflow: hidden;
}

/* Banner background */
.bg-banner {
  position: fixed; inset: 0; z-index: 0;
  background-size: cover; background-position: center;
  transition: background-image 0.6s ease;
}

/* Banner media (images/videos) */
.bg-media {
  position: fixed; inset: 0; z-index: -1;
  object-fit: cover; width: 100%; height: 100%;
  opacity: 0; transition: opacity 0.8s ease;
}
.bg-media.show { opacity: 1; }

.bg-banner::after {
  content: ''; position: absolute; inset: 0;
  background: rgba(0,0,0,0.7);
}

/* Back button */
.back-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  padding: 16px 20px; display: flex; align-items: center; gap: 12px;
}
.back-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border: none; display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text);
}
.back-btn svg { width: 20px; height: 20px; }
.back-title { font-size: 17px; font-weight: 600; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }

/* ── Gallery View ── */
.gallery {
  position: fixed; inset: 0; z-index: 10;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.4s ease;
}
.gallery.hidden { opacity: 0; pointer-events: none; }

.arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 48px; height: 48px; border-radius: 50%;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.15);
  color: #fff; font-size: 22px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 15;
  transition: background 0.2s, transform 0.2s;
}
.arrow:hover { background: rgba(255,255,255,0.22); }
.arrow:active { transform: translateY(-50%) scale(0.92); }
.arrow-left { left: 24px; }
.arrow-right { right: 24px; }

.cover-stage {
  position: relative;
  transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.cover-stage.slide-left { transform: translateX(-120px); opacity: 0; }
.cover-stage.slide-right { transform: translateX(120px); opacity: 0; }

.cover-main {
  width: min(280px, 30vw);
  height: min(280px, 30vw);
  border-radius: var(--radius);
  background: center/cover;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  cursor: pointer;
  transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.cover-main:active { transform: scale(0.96); }



.gallery-inner {
  display: flex; flex-direction: column;
  align-items: center; gap: 0;
}
.gallery-title {
  text-align: center; margin-top: 16px;
  opacity: 0; transform: translateY(10px);
  transition: all 0.5s ease 0.15s;
}
.gallery-title.show { opacity: 1; transform: translateY(0); }
.gallery-title .gt-artist { font-size: 14px; color: var(--text-secondary); }
.gallery-title .gt-name { font-size: 20px; font-weight: 700; margin-top: 4px; }

/* ── Detail View ── */
.detail-overlay {
  position: fixed; inset: 0; z-index: 30;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s ease;
}
.detail-overlay.active { opacity: 1; pointer-events: auto; }

.detail-cover {
  position: fixed;
  width: min(280px, 30vw);
  height: min(280px, 30vw);
  border-radius: var(--radius);
  background: center/cover;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  z-index: 35;
  transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
/* gallery position - centered */
.detail-cover.gallery-pos {
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
/* detail position - top left */
.detail-cover.detail-pos {
  top: 120px; left: 80px;
  width: min(200px, 22vw);
  height: min(200px, 22vw);
  border-radius: 12px;
  transform: none;
}

.detail-info {
  position: fixed;
  top: 120px; left: 80px;
  z-index: 36;
  opacity: 0;
  transform: translateY(-10px);
  transition: all 0.5s ease 0.2s;
}
.detail-info.show {
  opacity: 1; transform: translateY(0);
}
.detail-info .di-artist {
  font-size: 15px; color: var(--text-secondary);
  margin-top: min(210px, 23vw);
}

.album-desc {
  max-width: 620px;
  margin-top: 20px;
  max-height: 280px; overflow-y: auto;
  font-size: 13px; color: var(--text-secondary);
  line-height: 1.7;
  opacity: 0; transform: translateY(10px);
  transition: all 0.5s ease 0.4s;
}
.album-desc.show { opacity: 1; transform: translateY(0); }
.album-desc::-webkit-scrollbar { width: 3px; }
.album-desc::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

.detail-info .di-name {
  font-size: 24px; font-weight: 700;
  margin-top: 4px;
}

/* Song list */
.song-list {
  position: fixed;
  top: 120px; right: 60px; bottom: 40px;
  width: calc(100% - min(280px, 32vw) - 100px);
  max-width: 600px;
  z-index: 36;
  overflow-y: auto;
  opacity: 0;
  transform: translateX(30px);
  transition: all 0.5s ease 0.3s;
  padding-right: 8px;
}
.song-list.show {
  opacity: 1; transform: translateX(0);
}
.song-list::-webkit-scrollbar { width: 4px; }
.song-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

.song-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; border-radius: 8px;
  cursor: pointer; text-decoration: none; color: inherit;
  transition: background 0.2s;
}
.song-row:hover { background: rgba(255,255,255,0.08); }
.song-num {
  width: 28px; text-align: right;
  font-size: 13px; color: var(--text-secondary);
  flex-shrink: 0;
}
.song-body { flex: 1; min-width: 0; }
.song-body .sn { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.song-body .sa { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.song-dur {
  font-size: 12px; color: var(--text-secondary);
  flex-shrink: 0;
}

/* Responsive */
@media (max-width: 768px) {
  .gallery-title .gt-name { font-size: 16px; }
  .gallery-title .gt-artist { font-size: 12px; }
  .arrow { width: 36px; height: 36px; font-size: 18px; }
  .arrow-left { left: 12px; } .arrow-right { right: 12px; }
  .cover-main, .detail-cover.gallery-pos {
    width: min(220px, 55vw); height: min(220px, 55vw);
  }
  .album-desc { max-width: 120px; }
  .detail-cover.detail-pos {
    top: 100px; left: 30px;
    width: 120px; height: 120px;
  }
  .detail-info { top: 100px; left: 30px; }
  .detail-info .di-artist { margin-top: 130px; font-size: 13px; }
  
.album-desc {
  max-width: 620px;
  margin-top: 20px;
  max-height: 280px; overflow-y: auto;
  font-size: 13px; color: var(--text-secondary);
  line-height: 1.7;
  opacity: 0; transform: translateY(10px);
  transition: all 0.5s ease 0.4s;
}
.album-desc.show { opacity: 1; transform: translateY(0); }
.album-desc::-webkit-scrollbar { width: 3px; }
.album-desc::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

.detail-info .di-name { font-size: 18px; }
  .song-list {
    top: 220px; right: 20px; left: 20px;
    width: auto; max-width: none; bottom: 20px;
  }
}
</style>
</head>
<body>

<!-- Banner background -->
<img class="bg-media" id="bgMediaImg" style="display:none;">
<video class="bg-media" id="bgMediaVid" muted loop playsinline style="display:none;"></video>
<div class="bg-banner" id="bgBanner"></div>

<!-- Back button -->
<div class="back-bar">
  <button class="back-btn" onclick="goBack()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="back-title" id="backTitle">收藏专辑</span>
</div>

<!-- Gallery View -->
<div class="gallery" id="gallery">
  <button class="arrow arrow-left" onclick="prevAlbum()">&#8249;</button>
  <div class="gallery-inner">
    <div class="cover-stage" id="coverStage">
      <div class="cover-main" id="coverMain" onclick="openDetail()"></div>
    </div>
    <div class="gallery-title" id="galleryTitle">
      <div class="gt-artist" id="gtArtist"></div>
      <div class="gt-name" id="gtName"></div>
    </div>
  </div>
  <button class="arrow arrow-right" onclick="nextAlbum()">&#8250;</button>
</div>

<!-- Detail Overlay -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-cover gallery-pos" id="detailCover"></div>
  <div class="detail-info" id="detailInfo">
    <div class="di-artist" id="diArtist"></div>
    <div class="di-name" id="diName"></div>
    <div class="album-desc" id="albumDesc"></div>
  </div>
  <div class="song-list" id="songList"></div>
</div>

<script>
var albums = [];
var current = 0;

// Banner media support - place images/videos as banner-0.jpg(banner-0.mp4) through banner-7.jpg(banner-7.mp4)
var bannerVideos = [];
for (var i = 0; i < 8; i++) {
  var vid = document.createElement('video');
  vid.src = 'banner-' + i + '.mp4';
  vid.muted = true; vid.loop = true; vid.playsInline = true;
  vid.preload = 'auto';
  bannerVideos.push(vid);
}

function setBanner(idx) {
  var img = document.getElementById('bgMediaImg');
  var vid = document.getElementById('bgMediaVid');
  var banner = document.getElementById('bgBanner');
  var isMobile = window.innerWidth < 768;

  // On mobile, skip video to avoid data/playback issues
  if (isMobile) {
    vid.classList.remove('show'); vid.style.display = 'none';
    img.style.display = '';
    img.src = 'banner-' + idx + '.jpg';
    img.onload = function() { img.classList.add('show'); banner.style.opacity = '0'; };
    img.onerror = function() { img.classList.remove('show'); banner.style.opacity = '1'; };
    return;
  }

  // Desktop: try video, with suppressed errors
  vid.classList.remove('show');
  vid.style.display = '';
  vid.src = 'banner-' + idx + '.mp4';
  vid.onerror = function() { useFallback(); };
  vid.load();
  var playPromise = vid.play();
  if (playPromise) {
    playPromise.then(function() {
      vid.classList.add('show');
      img.classList.remove('show');
      banner.style.opacity = '0';
    }).catch(function() { useFallback(); });
  } else { useFallback(); }

  function useFallback() {
    vid.style.display = 'none'; vid.classList.remove('show'); vid.pause();
    img.style.display = '';
    img.src = 'banner-' + idx + '.jpg';
    img.onload = function() { img.classList.add('show'); banner.style.opacity = '0'; };
    img.onerror = function() { img.classList.remove('show'); banner.style.opacity = '1'; };
  }
}

var isDetail = false;
var switching = false;

fetch('albums_data.json')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    albums = data;
    showAlbum(0);
    setTimeout(function() { document.getElementById('galleryTitle').classList.add('show'); }, 300);
  });

function showAlbum(idx) {
  if (idx < 0 || idx >= albums.length) return;
  current = idx;
  var a = albums[current];
  var cover = a.cover + '?param=400y400';

  document.getElementById('bgBanner').style.backgroundImage = 'url(' + cover + ')';
  setBanner(idx);
  document.getElementById('gtArtist').textContent = a.artist;
  document.getElementById('gtName').textContent = a.name;
  document.getElementById('coverMain').style.backgroundImage = 'url(' + cover + ')';
  document.getElementById('detailCover').style.backgroundImage = 'url(' + cover + ')';
  document.getElementById('diArtist').textContent = a.artist;
  document.getElementById('diName').textContent = a.name;
  document.getElementById('albumDesc').innerHTML = a.description || '';

  var sl = document.getElementById('songList');
  sl.innerHTML = '';
  a.songs.forEach(function(s, i) {
    var row = document.createElement('a');
    row.className = 'song-row';
    row.href = 'https://music.163.com/#/song?id=' + s.id;
    row.target = '_blank';
    row.innerHTML =
      '<span class="song-num">' + (i + 1) + '</span>' +
      '<div class="song-body"><div class="sn">' + s.name + '</div><div class="sa">' + s.artist + '</div></div>' +
      '<span class="song-dur">&#9654;</span>';
    sl.appendChild(row);
  });
}

function nextAlbum() {
  if (switching || isDetail) return;
  switching = true;
  var stage = document.getElementById('coverStage');
  stage.classList.add('slide-left');
  setTimeout(function() {
    showAlbum((current + 1) % albums.length);
    stage.classList.remove('slide-left');
    switching = false;
  }, 350);
}

function prevAlbum() {
  if (switching || isDetail) return;
  switching = true;
  var stage = document.getElementById('coverStage');
  stage.classList.add('slide-right');
  setTimeout(function() {
    showAlbum((current - 1 + albums.length) % albums.length);
    stage.classList.remove('slide-right');
    switching = false;
  }, 350);
}

function openDetail() {
  if (isDetail || switching) return;
  isDetail = true;
  document.getElementById('gallery').classList.add('hidden');
  document.getElementById('galleryTitle').classList.remove('show');
  document.getElementById('detailOverlay').classList.add('active');
  var dc = document.getElementById('detailCover');
  dc.classList.remove('gallery-pos');
  dc.classList.add('detail-pos');
  document.getElementById('detailInfo').classList.add('show');
  document.getElementById('albumDesc').classList.add('show');
  document.getElementById('songList').classList.add('show');
  document.getElementById('backTitle').textContent = '返回';
}

function goBack() {
  if (isDetail) {
    closeDetail();
  } else {
    history.back();
  }
}

function closeDetail() {
  isDetail = false;
  document.getElementById('gallery').classList.remove('hidden');
  setTimeout(function() { document.getElementById('galleryTitle').classList.add('show'); }, 100);
  document.getElementById('detailOverlay').classList.remove('active');
  var dc = document.getElementById('detailCover');
  dc.classList.add('gallery-pos');
  dc.classList.remove('detail-pos');
  document.getElementById('detailInfo').classList.remove('show');
  document.getElementById('albumDesc').classList.remove('show');
  document.getElementById('songList').classList.remove('show');
  document.getElementById('backTitle').textContent = '收藏专辑';
}

// Keyboard
document.addEventListener('keydown', function(e) {
  if (!isDetail) {
    if (e.key === 'ArrowLeft') prevAlbum();
    if (e.key === 'ArrowRight') nextAlbum();
    if (e.key === 'Enter') openDetail();
  }
  if (e.key === 'Escape' && isDetail) closeDetail();
});
</script>
</body>
</html>
